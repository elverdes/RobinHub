<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - RobinHub</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; }
        .container { width: 100%; max-width: 450px; margin: 80px auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h2 { color:#1b8246; text-align:center; }
        input { width:100%; padding:12px; margin-top:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:6px; box-sizing: border-box; }
        button { width:100%; padding:12px; font-size:1rem; background:#1b8246; color:white; border:none; border-radius:6px; cursor:pointer; }
        button:hover { background:#146a38; }
        p { text-align:center; margin-top:20px; }
        a { color:#1b8246; text-decoration:none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Crear cuenta</h2>
        <form onsubmit="handleRegister(event)">
            <input type="text" id="name" placeholder="Nombre completo" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <input type="password" id="password2" placeholder="Repetir contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <script type="module">
            import { auth, db } from "./firebase.js";
            import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
            import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

            window.handleRegister = async function(e){
                e.preventDefault();
                const nombre = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const password2 = document.getElementById("password2").value;

                if(password !== password2){
                    alert("Las contraseñas no coinciden");
                    return;
                }

                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // Inicializamos con biografía vacía
                    await setDoc(doc(db, "users", user.uid), {
                        nombre,
                        email,
                        biografia: "¡Hola! Soy nuevo en RobinHub.",
                        avatar: "https://ui-avatars.com/api/?name=" + encodeURIComponent(nombre)
                    });

                    window.location.href = "inicio.html";
                } catch(error){
                    alert(error.message);
                }
            }
        </script>
        <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
    </div>
</body>
</html>
