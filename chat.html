<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="shared/styles.css">
</head>
<body id="bodyTag">
    <div id="editPanel" class="edit-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3 style="margin:0;">Configurar Menú</h3>
            <button onclick="toggleEditPanel()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-main);">✕</button>
        </div>
        <div id="editList"></div>
        <button onclick="toggleEditPanel()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; margin-top:20px; font-weight:bold; cursor:pointer;">Cerrar y Guardar</button>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="#" id="sidePerfil">👤 Mi Perfil</a>
        <a href="inicio.html">🌲 El Bosque</a>
        <a href="publicar.html">🚀 Publicar Idea</a>
        <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin:15px 25px;">
        <a class="submenu-toggle" onclick="event.preventDefault(); toggleSubmenu()">⚙️ Ajustes ▾</a>
        <div id="submenuAjustes" class="submenu"></div>
        <a href="sugerencias.html">💡 Sugerencias</a>
        <a href="#" id="sideLogout" style="color: #ff4757;">🚪 Cerrar Sesión</a>
    </div>

    <header>
        <div class="nav-top">
            <div class="header-left">
                <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
                <div class="flecha-container" onclick="toggleMenu()">
                    <div class="flecha"></div>
                </div>
            </div>
            <div class="controls-wrapper">
                <button class="btn-action" onclick="window.location.href='perfil.html?uid=' + (currentUser ? currentUser.uid : '')">Mi perfil</button>
            </div>
        </div>
        <div class="nav-bottom">
            <div><span class="brand-text-bottom">obinHub</span></div>
            <div class="consejo-texto" id="randomTip">Cargando conversación...</div>
        </div>
    </header>

    <main class="container" style="padding: 40px 5%;">
        <div class="chat-card" style="padding: 30px;">
            <h2 id="chatTitle">Cargando chat...</h2>
            <p id="chatSubtitle" style="margin: 8px 0 18px; color: var(--text-secondary);"></p>
            <div id="messagesList" class="message-list"></div>
            <div class="message-input">
                <textarea id="messageInput" placeholder="Escribe tu mensaje..."></textarea>
                <button class="btn-action" id="sendButton">Enviar</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase.js';
        import { applySavedTheme, toggleTheme, toggleMenu, toggleSubmenu, loadMenuConfig, setupSidebar, createEditPanel, renderSubmenu } from './shared/common.js';
        import {
            onAuthStateChanged,
            signOut
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import {
            collection,
            doc,
            getDoc,
            addDoc,
            updateDoc,
            orderBy,
            query,
            onSnapshot,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        let currentUser = null;
        const chatId = new URLSearchParams(window.location.search).get('chatId');
        let chatRef = null;
        const tips = [
            "Este chat es privado entre tú y el creador.",
            "Puedes enviar mensajes rápidos y continuos.",
            "Recuerda ser amable y claro en tus respuestas."
        ];
        const menuConfig = loadMenuConfig();
        window.toggleMenu = toggleMenu;
        window.toggleSubmenu = toggleSubmenu;
        window.toggleTheme = toggleTheme;
        window.toggleEditPanel = () => {
            const editPanel = document.getElementById('editPanel');
            editPanel.classList.toggle('active');
            renderMenuConfig();
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            setupSidebar({
                config: menuConfig,
                onPerfil: () => { window.location.href = `perfil.html?uid=${currentUser.uid}`; },
                onLogout: async () => {
                    await signOut(auth);
                    window.location.href = 'RobinHub.html';
                },
                onEdit: window.toggleEditPanel,
                onMore: () => window.location.href = 'ajustes.html'
            });
            renderMenuConfig();
            if (!chatId) {
                alert('Chat no identificado.');
                window.location.href = 'inicio.html';
                return;
            }

            chatRef = doc(db, 'chats', chatId);
            const chatSnap = await getDoc(chatRef);
            if (!chatSnap.exists()) {
                alert('El chat no existe.');
                window.location.href = 'inicio.html';
                return;
            }

            const chat = chatSnap.data();
            if (!Array.isArray(chat.participants) || !chat.participants.includes(user.uid)) {
                alert('No tienes permiso para ver este chat.');
                window.location.href = 'inicio.html';
                return;
            }

            const otherUid = chat.participants.find(id => id !== user.uid) || user.uid;
            const otherDoc = await getDoc(doc(db, 'users', otherUid));
            const otherName = otherDoc.exists() ? otherDoc.data().nombre || 'Usuario' : 'Usuario';
            document.getElementById('chatTitle').textContent = `Chat con ${otherName}`;
            if (chat.projectTitle) {
                document.getElementById('chatSubtitle').textContent = `Proyecto: ${chat.projectTitle}`;
            }

            listenMessages();
        });

        function renderMessages(snapshot) {
            const container = document.getElementById('messagesList');
            container.innerHTML = '';
            snapshot.forEach(docMsg => {
                const msg = docMsg.data();
                const card = document.createElement('div');
                card.className = 'message-card ' + (msg.senderId === currentUser.uid ? 'self' : 'other');
                const createdAt = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleString() : '';
                card.innerHTML = `
                    <div>${msg.text || ''}</div>
                    <div class="message-meta">${msg.senderId === currentUser.uid ? 'Tú' : 'Otro'} · ${createdAt}</div>
                `;
                container.appendChild(card);
            });
            container.scrollTop = container.scrollHeight;
        }

        function listenMessages() {
            const messagesQuery = query(collection(chatRef, 'messages'), orderBy('createdAt', 'asc'));
            onSnapshot(messagesQuery, renderMessages);
        }

        document.getElementById('sendButton').addEventListener('click', async () => {
            const textArea = document.getElementById('messageInput');
            const text = textArea.value.trim();
            if (!text) return;
            await addDoc(collection(chatRef, 'messages'), {
                senderId: currentUser.uid,
                text,
                createdAt: serverTimestamp(),
            });
            await updateDoc(chatRef, {
                lastMessage: text,
                lastMessageAt: serverTimestamp(),
            });
            textArea.value = '';
        });

        function renderMenuConfig() {
            renderSubmenu({
                config: menuConfig,
                onEdit: window.toggleEditPanel,
                onMore: () => window.location.href = 'ajustes.html'
            });
            createEditPanel(menuConfig, 'editList', renderMenuConfig);
        }

        applySavedTheme();
        document.getElementById('randomTip').textContent = tips[Math.floor(Math.random() * tips.length)];
    </script>
</body>
</html>
