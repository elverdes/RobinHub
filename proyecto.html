<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto - RobinHub</title>
    <style>
        :root { 
            --primary: #1b8246; 
            --accent: #2ecc71;
            --light-green: #e8f5e9;
            --sidebar-width: 300px;
            /* Variables para el Modo Claro/Oscuro */
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #777777;
            --nav-bottom-bg: var(--light-green);
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --overlay: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-card: #1a1a1a;
            --text-main: #f0f0f0;
            --text-secondary: #bbbbbb;
            --nav-bottom-bg: #0d3d21;
            --sidebar-bg: rgba(20, 20, 20, 0.98);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-image: url('claro.png'); 
            background-size: 100% auto;
            background-repeat: repeat-y; 
            background-attachment: scroll;
            color: var(--text-main);
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1; pointer-events: none;
        }
        
        header { position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-top { background: var(--primary); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .nav-bottom { 
            background: var(--nav-bottom-bg); height: 60px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5% 0 150px; border-bottom: 4px solid var(--accent);
            transition: background 0.5s ease;
        }

        .brand-text-bottom {
            color: var(--primary); font-size: 32px; font-weight: 800;
            margin-left: 40px; letter-spacing: -1px; pointer-events: none; user-select: none;
        }

        .consejo-texto { color: var(--primary); font-size: 15px; font-weight: 600; font-style: italic; }

        /* --- LOGO SAGRADO --- */
        .header-left { position: relative; display: flex; align-items: center; }
        .logo-arquero {
            width: 145px; height: auto; cursor: pointer; z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
            position: absolute; top: -35px; left: 0;
        }

        /* --- FLECHA --- */
        .flecha-container {
            position: absolute; left: 75px; top: 5px;
            width: 80px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2500;
        }
        .flecha { width: 50px; height: 4px; background: #ffffff; box-shadow: 0 0 8px white; border-radius: 2px; position: relative; }
        .flecha::after { content: ''; position: absolute; right: -2px; top: -5px; border-left: 14px solid white; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
        .menu-open .flecha-container { opacity: 1; left: calc(var(--sidebar-width) - 40px); pointer-events: auto; }
        
        .project-container { 
            max-width: 1000px; margin: 40px auto; background: var(--bg-card); 
            border-radius: 35px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 1px solid rgba(27, 130, 70, 0.1);
        }
        
        .project-hero { width: 100%; height: 500px; object-fit: cover; }
        .project-content { padding: 45px; }
        .project-content h1 { font-size: 38px; color: #1b5e20; margin: 0 0 20px 0; font-weight: 800; }
        
        .author-box { display: flex; align-items: center; gap: 15px; background: #f1f8f4; padding: 20px 30px; border-radius: 25px; margin-bottom: 30px; cursor: pointer; border: 1px solid #c8e6c9; transition: 0.3s; }
        .author-box:hover { background: #e8f5e9; transform: translateX(5px); }
        .author-box img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .author-box strong { color: var(--primary); font-size: 20px; }

        .tags-detail { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .tag-pill { background: var(--primary); color: white; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        
        .description { line-height: 1.8; color: #333; font-size: 19px; white-space: pre-wrap; margin: 35px 0; background: #fafafa; padding: 25px; border-radius: 20px; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #f0f0f0; padding-top: 30px; }
        .btn-like { background: white; border: 2.5px solid #ff4757; color: #ff4757; padding: 14px 40px; border-radius: 35px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; font-size: 16px; }
        .btn-like:hover { transform: scale(1.05); }
        .btn-like.active { background: #ff4757; color: white; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3); }

        .more-section { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
        .more-section h3 { border-left: 6px solid var(--primary); padding-left: 15px; color: #1b5e20; margin-bottom: 25px; font-size: 24px; }
        .reco-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .reco-card { background: white; border-radius: 22px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.06); cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .reco-card:hover { transform: translateY(-5px); }
        .reco-card img { width: 100%; height: 140px; object-fit: cover; }
        .reco-card h4 { padding: 15px; margin: 0; font-size: 16px; color: #333; text-align: center; }

        /* --- SIDEBAR IZQUIERDA --- */
        .sidebar {
            height: 100%; width: var(--sidebar-width); position: fixed; top: 0; left: calc(var(--sidebar-width) * -1);
            background: var(--sidebar-bg); backdrop-filter: blur(15px); z-index: 2000;
            transition: 0.5s; box-shadow: 8px 0 30px rgba(0,0,0,0.15); padding-top: 150px;
        }
        .menu-open .sidebar { left: 0; }
        .sidebar a { padding: 18px 35px; text-decoration: none; font-size: 18px; color: var(--text-main); display: block; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { background: var(--light-green); color: var(--primary); transform: translateX(10px); }

        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0, 0, 0, 0.05); }
        .submenu-active { max-height: 500px; }
        .submenu a { padding: 12px 50px; font-size: 15px; opacity: 0.8; }
[data-theme="dark"] {
    --bg-card: #1a1a1a;
    --text-main: #f0f0f0;
    --light-green: #0d3d21; /* Verde muy oscuro para el fondo del nav-bottom */
}

/* Aplicación del fondo oscuro al overlay */
[data-theme="dark"] body::after {
    background: rgba(0, 0, 0, 0.6) !important;
}

/* Si tienes tarjetas de sugerencias o publicar, añade esto para que cambien de color */
[data-theme="dark"] .sugerencia-card, 
[data-theme="dark"] .publicar-container,
[data-theme="dark"] .ajustes-card {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
    border-color: rgba(255,255,255,0.1);
}


    </style>
</head>
<body id="bodyTag">

<header>
    <div class="nav-top">
        <div class="header-left">
            <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
            <div class="flecha-container" onclick="toggleMenu()">
                <div class="flecha"></div>
            </div>
        </div>
    </div>
    <div class="nav-bottom">
        <div><span class="brand-text-bottom">obinHub</span></div>
        <div class="consejo-texto" id="randomTip">Explora ideas fascinantes...</div>
    </div>
</header>

<div id="mySidebar" class="sidebar">
    <a href="#" id="sidePerfil">👤 Mi Perfil</a>
    <a href="inicio.html">🌲 El Bosque</a>
    <a href="publicar.html">🚀 Publicar Idea</a>
    <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin:15px 25px;">
    
    <a onclick="event.preventDefault(); toggleSubmenu()">⚙️ Ajustes ▾</a>
    <div id="submenuAjustes" class="submenu"></div>

    <a href="sugerencias.html">💡 Sugerencias</a>
    <a href="#" id="sideLogout" style="color: #ff4757;">🚪 Cerrar Sesión</a>
</div>

<div class="project-container">
    <img id="p-img" class="project-hero">
    <div class="project-content">
        <h1 id="p-titulo">Cargando...</h1>
        
        <div class="author-box" id="authorBox">
            <img id="author-img" src="https://ui-avatars.com/api/?name=U">
            <div>
                <strong id="p-autor">Usuario</strong>
                <div style="font-size: 13px; color: #666;">Ver Perfil Completo</div>
            </div>
        </div>

        <div id="p-tags" class="tags-detail"></div>
        <div id="p-desc" class="description"></div>

        <div class="action-bar">
            <button id="likeBtn" class="btn-like">
                <span id="likeIcon" style="font-size:20px">🤍</span> <span id="likesCount">0</span> Likes
            </button>
            <div style="font-size: 20px; color: #555; font-weight: bold;">👁️ <span id="visitasCount">0</span> <span style="font-size: 14px; color: #888;">Visualizaciones</span></div>
        </div>
    </div>
</div>

<div class="more-section">
    <h3>Más de este autor</h3>
    <div id="author-projects" class="reco-grid"></div>
    
    <h3 style="margin-top:60px">Proyectos que podrían interesarte</h3>
    <div id="similar-projects" class="reco-grid"></div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { doc, onSnapshot, updateDoc, increment, arrayUnion, arrayRemove, getDocs, collection, query, where, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- CONSEJOS ALEATORIOS ---
    const tips = [
        "Explora ideas fascinantes...",
        "Cada proyecto cuenta una historia.",
        "Inspírate en las creaciones de otros.",
        "Comparte tus pensamientos con likes.",
        "Descubre el potencial de las ideas."
    ];
    document.getElementById("randomTip").textContent = tips[Math.floor(Math.random() * tips.length)];

    const projectId = new URLSearchParams(window.location.search).get("id");
    if(!projectId) window.location.href = "inicio.html";

    const docRef = doc(db, "proyectos", projectId);

    // Sumar visita una sola vez al cargar
    updateDoc(docRef, { visitas: increment(1) }).catch(()=>{});

    // Escuchar el proyecto en tiempo real
    onSnapshot(docRef, async (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        
        document.getElementById("p-titulo").textContent = data.titulo;
        document.getElementById("p-desc").textContent = data.descripcion;
        document.getElementById("p-img").src = data.imagen;
        document.getElementById("likesCount").textContent = data.likes || 0;
        document.getElementById("visitasCount").textContent = data.visitas || 0;

        // Cargar datos del autor desde la colección users
        const authorSnap = await getDoc(doc(db, "users", data.userId));
        if(authorSnap.exists()) {
            const u = authorSnap.data();
            document.getElementById("p-autor").textContent = u.nombre;
            document.getElementById("author-img").src = u.foto || `https://ui-avatars.com/api/?name=${u.nombre}`;
        }
        
        document.getElementById("authorBox").onclick = () => location.href=`perfil.html?uid=${data.userId}`;

        // Renderizar Tags
        const tagsBox = document.getElementById("p-tags");
        tagsBox.innerHTML = "";
        (data.tags || []).forEach(t => {
            const span = document.createElement("span");
            span.className = "tag-pill";
            span.textContent = "#" + t;
            tagsBox.appendChild(span);
        });

        loadAuthorProjects(data.userId, projectId);
        loadSimilarProjects(data.tags || [], projectId);

        // Comprobar si el usuario ya dio like
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const liked = (data.likedBy || []).includes(user.uid);
                document.getElementById("likeBtn").className = liked ? "btn-like active" : "btn-like";
                document.getElementById("likeIcon").textContent = liked ? "❤️" : "🤍";
            }
        });
    });

    async function loadAuthorProjects(uid, currentId) {
        const q = query(collection(db, "proyectos"), where("userId", "==", uid), limit(4));
        const snap = await getDocs(q);
        const box = document.getElementById("author-projects");
        box.innerHTML = "";
        snap.forEach(d => {
            if(d.id !== currentId) renderReco(box, d.id, d.data());
        });
    }

    async function loadSimilarProjects(tags, currentId) {
        if(!tags.length) return;
        const q = query(collection(db, "proyectos"), where("tags", "array-contains", tags[0]), limit(4));
        const snap = await getDocs(q);
        const box = document.getElementById("similar-projects");
        box.innerHTML = "";
        snap.forEach(d => {
            if(d.id !== currentId) renderReco(box, d.id, d.data());
        });
    }

    function renderReco(container, id, data) {
        const div = document.createElement("div");
        div.className = "reco-card";
        div.innerHTML = `<img src="${data.imagen}"><h4>${data.titulo}</h4>`;
        div.onclick = () => location.href = `proyecto.html?id=${id}`;
        container.appendChild(div);
    }

    // Lógica del Botón Like
    document.getElementById("likeBtn").onclick = async () => {
        const user = auth.currentUser;
        if (!user) return alert("Debes iniciar sesión para dar like");
        const isLiked = document.getElementById("likeBtn").classList.contains("active");
        await updateDoc(docRef, {
            likes: increment(isLiked ? -1 : 1),
            likedBy: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid)
        });
    };
    // --- LÓGICA DE PERSISTENCIA DE TEMA ---
function aplicarTemaGuardado() {
    const tema = localStorage.getItem('robinTema') || 'claro';
    const body = document.body;
    
    if (tema === 'oscuro') {
        document.documentElement.setAttribute("data-theme", "dark");
        body.style.backgroundImage = "url('oscuro.png')";
    } else {
        document.documentElement.removeAttribute("data-theme");
        body.style.backgroundImage = "url('claro.png')";
    }
}

// Función para cambiar el tema (llámala desde tu botón del menú)
window.toggleTheme = () => {
    const esOscuro = document.documentElement.getAttribute("data-theme") === "dark";
    const nuevoTema = esOscuro ? 'claro' : 'oscuro';
    
    localStorage.setItem('robinTema', nuevoTema);
    aplicarTemaGuardado();
};

// Ejecutar inmediatamente al cargar la página
aplicarTemaGuardado();

// --- FUNCIONES PARA SIDEBAR ---
window.toggleMenu = () => document.getElementById("bodyTag").classList.toggle("menu-open");
window.toggleSubmenu = () => document.getElementById("submenuAjustes").classList.toggle("submenu-active");

// Cerrar sidebar al navegar
function closeMenu() {
    document.getElementById("bodyTag").classList.remove("menu-open");
}

// Configurar sidebar
const DEFAULT_CONFIG = [
    { id: 'tema', label: '🌓 Modo claro/oscuro', visible: true },
    { id: 'notif', label: '🔔 Notificaciones', visible: true },
    { id: 'edit', label: '✏️ Editar', visible: true },
    { id: 'more', label: '⚙️ Más ajustes', visible: true }
];

let menuConfig = JSON.parse(localStorage.getItem('robinMenuConfig')) || DEFAULT_CONFIG;

function renderSubmenu() {
    const container = document.getElementById("submenuAjustes");
    if(!container) return;
    container.innerHTML = "";
    menuConfig.forEach(item => {
        if (item.visible) {
            const a = document.createElement("a");
            a.textContent = item.label;
            a.onclick = () => {
                if (item.id === 'tema') toggleTheme();
                else if (item.id === 'more') { closeMenu(); window.location.href = 'ajustes.html'; }
            };
            container.appendChild(a);
        }
    });
}

renderSubmenu();

// Configurar enlaces de sidebar - cerrar al navegar
const sidebarLinks = document.querySelectorAll('.sidebar a:not(#sideLogout)');
sidebarLinks.forEach(link => {
    link.addEventListener('click', closeMenu);
});

// Configurar enlaces de sidebar especiales
document.getElementById("sidePerfil").onclick = () => { closeMenu(); window.location.href = `perfil.html?uid=${auth.currentUser?.uid}`; };
document.getElementById("sideLogout").onclick = async () => {
    closeMenu();
    await signOut(auth);
    window.location.href = "RobinHub.html";
};

</script>
</body>
</html>
