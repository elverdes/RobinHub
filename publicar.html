<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar - RobinHub</title>
    <style>
        :root { 
            --primary: #1b8246; 
            --accent: #2ecc71;
            --light-green: #e8f5e9;
            --sidebar-width: 300px;
            /* Variables para el Modo Claro/Oscuro */
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #777777;
            --nav-bottom-bg: var(--light-green);
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --overlay: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-card: #1a1a1a;
            --text-main: #f0f0f0;
            --text-secondary: #bbbbbb;
            --nav-bottom-bg: #0d3d21;
            --sidebar-bg: rgba(20, 20, 20, 0.98);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-image: url('claro.png'); 
            background-size: 100% auto; background-repeat: repeat-y; 
            background-attachment: scroll; overflow-x: hidden;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1; pointer-events: none;
            transition: background 0.5s ease;
        }

        /* --- HEADER --- */
        header { position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-top { background: var(--primary); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .nav-bottom { 
            background: var(--nav-bottom-bg); height: 60px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5% 0 150px; border-bottom: 4px solid var(--accent);
            transition: background 0.5s ease;
        }

        .brand-text-bottom {
            color: var(--primary); font-size: 32px; font-weight: 800;
            margin-left: 40px; letter-spacing: -1px; pointer-events: none; user-select: none;
        }

        .consejo-texto { color: var(--primary); font-size: 15px; font-weight: 600; font-style: italic; }

        /* --- GRID Y CONTROLES --- */
        .controls-wrapper { display: flex; align-items: center; gap: 15px; flex-grow: 1; margin-left: 100px; }
        .container { max-width: 500px; margin: 40px auto; background: var(--bg-card); padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); color: var(--text-main); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        /* Buscador de Tags Popularity */
        .tags-wrapper { position: relative; }
        #suggestions { 
            position: absolute; top: 45px; left: 0; width: 100%; 
            background: white; border: 1px solid #ddd; border-radius: 8px; 
            max-height: 200px; overflow-y: auto; z-index: 10; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; display: flex; justify-content: space-between; }
        .suggestion-item:hover { background: #e9f8ef; color: var(--primary); }
        .tag-count { font-size: 11px; color: #999; background: #eee; padding: 2px 6px; border-radius: 10px; }

        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #preview { width: 100%; border-radius: 8px; margin-bottom: 15px; display: none; max-height: 200px; object-fit: cover; border: 1px solid #ddd; }
        .tag-list { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tag-item { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; font-size: 12px; }
        .back-link { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; display: inline-block; margin-bottom: 15px; }

        /* --- LOGO SAGRADO --- */
        .header-left { position: relative; display: flex; align-items: center; }
        .logo-arquero {
            width: 145px; height: auto; cursor: pointer; z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
            position: absolute; top: -35px; left: 0;
        }

        /* --- FLECHA --- */
        .flecha-container {
            position: absolute; left: 75px; top: 5px;
            width: 80px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2500;
        }
        .flecha { width: 50px; height: 4px; background: #ffffff; box-shadow: 0 0 8px white; border-radius: 2px; position: relative; }
        .flecha::after { content: ''; position: absolute; right: -2px; top: -5px; border-left: 14px solid white; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
        .menu-open .flecha-container { opacity: 1; left: calc(var(--sidebar-width) - 40px); pointer-events: auto; }

        /* --- SIDEBAR IZQUIERDA --- */
        .sidebar {
            height: 100%; width: var(--sidebar-width); position: fixed; top: 0; left: calc(var(--sidebar-width) * -1);
            background: var(--sidebar-bg); backdrop-filter: blur(15px); z-index: 2000;
            transition: 0.5s; box-shadow: 8px 0 30px rgba(0,0,0,0.15); padding-top: 150px;
        }
        .menu-open .sidebar { left: 0; }
        .sidebar a { padding: 18px 35px; text-decoration: none; font-size: 18px; color: var(--text-main); display: block; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { background: var(--light-green); color: var(--primary); transform: translateX(10px); }

        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0, 0, 0, 0.05); }
        .submenu-active { max-height: 500px; }
        .submenu a { padding: 12px 50px; font-size: 15px; opacity: 0.8; }
[data-theme="dark"] {
    --bg-card: #1a1a1a;
    --text-main: #f0f0f0;
    --light-green: #0d3d21; /* Verde muy oscuro para el fondo del nav-bottom */
}

/* Aplicación del fondo oscuro al overlay */
[data-theme="dark"] body::after {
    background: var(--overlay) !important;
}

/* Si tienes tarjetas de sugerencias o publicar, añade esto para que cambien de color */
[data-theme="dark"] .sugerencia-card, 
[data-theme="dark"] .publicar-container,
[data-theme="dark"] .ajustes-card {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
    border-color: rgba(255,255,255,0.1);
}


    </style>
</head>
<body id="bodyTag">

<header>
    <div class="nav-top">
        <div class="header-left">
            <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
            <div class="flecha-container" onclick="toggleMenu()">
                <div class="flecha"></div>
            </div>
        </div>
        <div class="controls-wrapper">
            <a href="inicio.html" class="back-link">← Volver al Bosque</a>
        </div>
    </div>
    <div class="nav-bottom">
        <div><span class="brand-text-bottom">obinHub</span></div>
        <div class="consejo-texto" id="randomTip">Cada gran proyecto comienza con una idea...</div>
    </div>
</header>

<div id="mySidebar" class="sidebar">
    <a href="#" id="sidePerfil">👤 Mi Perfil</a>
    <a href="inicio.html">🌲 El Bosque</a>
    <a href="publicar.html">🚀 Publicar Idea</a>
    <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin:15px 25px;">
    
    <a onclick="event.preventDefault(); toggleSubmenu()">⚙️ Ajustes ▾</a>
    <div id="submenuAjustes" class="submenu"></div>

    <a href="sugerencias.html">💡 Sugerencias</a>
    <a href="#" id="sideLogout" style="color: #ff4757;">🚪 Cerrar Sesión</a>
</div>

<div class="container">
    <a href="inicio.html" class="back-link">← Cancelar y volver</a>
    <h2>Lanzar Proyecto</h2>
    <form id="formPublicar">
        <label>Título</label>
        <input type="text" id="titulo" placeholder="Título de tu idea" required>
        
        <label>Descripción</label>
        <textarea id="descripcion" placeholder="Explica tu idea..." rows="4" required></textarea>
        
        <label>Imagen (Máx 1MB)</label>
        <input type="file" id="fileInput" accept="image/*" required>
        <img id="preview">
        
        <label>Etiquetas (Sugerencias: Las 10 más usadas)</label>
        <div class="tags-wrapper">
            <input type="text" id="tagInput" placeholder="Busca o crea etiquetas..." autocomplete="off">
            <div id="suggestions"></div>
        </div>
        <div id="tags" class="tag-list"></div>
        
        <button type="submit" id="btnLanzar">🚀 Lanzar Proyecto</button>
    </form>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONSEJOS ALEATORIOS ---
    const tips = [
        "Sé claro y conciso en el título de tu idea.",
        "Las etiquetas ayudan a otros a encontrar tu proyecto.",
        "Una buena descripción puede hacer la diferencia.",
        "Incluye una imagen atractiva para tu proyecto.",
        "Comparte tu visión y sueños con la comunidad.",
        "La creatividad no tiene límites, ¡atrévete!"
    ];
    document.getElementById("randomTip").textContent = tips[Math.floor(Math.random() * tips.length)];

    let base64 = "";
    let tagsArray = [];
    let tagsPopularity = []; // Guardará objetos { nombre, count }
    let isSubmitting = false;

    // 1. Calcular el TOP 10 de etiquetas más usadas
    async function loadPopularTags() {
        const querySnapshot = await getDocs(collection(db, "proyectos"));
        const counts = {};
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.tags && Array.isArray(data.tags)) {
                data.tags.forEach(tag => {
                    const t = tag.toLowerCase().trim();
                    counts[t] = (counts[t] || 0) + 1;
                });
            }
        });

        // Convertir a array, ordenar por frecuencia y quedar con el Top 10
        tagsPopularity = Object.keys(counts).map(name => ({
            name: name,
            count: counts[name]
        })).sort((a, b) => b.count - a.count);
    }
    
    loadPopularTags();

    // 2. Buscador con filtro del TOP 10
    const tagInput = document.getElementById("tagInput");
    const suggestionsBox = document.getElementById("suggestions");

    tagInput.addEventListener("input", (e) => {
        const value = e.target.value.toLowerCase().trim();
        suggestionsBox.innerHTML = "";
        
        // Filtramos las etiquetas populares que empiecen por lo escrito
        const filtered = tagsPopularity
            .filter(t => t.name.startsWith(value))
            .slice(0, 10); // Siempre mostramos máximo 10

        if (value.length > 0 && filtered.length > 0) {
            suggestionsBox.style.display = "block";
            filtered.forEach(tagObj => {
                const div = document.createElement("div");
                div.className = "suggestion-item";
                div.innerHTML = `<span>#${tagObj.name}</span> <span class="tag-count">${tagObj.count} usos</span>`;
                div.onclick = () => addTag(tagObj.name);
                suggestionsBox.appendChild(div);
            });
        } else {
            suggestionsBox.style.display = "none";
        }
    });

    function addTag(tag) {
        const cleanTag = tag.replace("#", "").trim().toLowerCase();
        if (cleanTag && !tagsArray.includes(cleanTag)) {
            tagsArray.push(cleanTag);
            const span = document.createElement("span");
            span.className = "tag-item";
            span.textContent = "#" + cleanTag;
            document.getElementById("tags").appendChild(span);
        }
        tagInput.value = "";
        suggestionsBox.style.display = "none";
    }

    tagInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            addTag(tagInput.value);
        }
    });

    // Vista previa imagen
    document.getElementById("fileInput").onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            if (file.size > 1048576) { alert("Imagen demasiado grande"); return; }
            const reader = new FileReader();
            reader.onload = (event) => {
                base64 = event.target.result;
                const img = document.getElementById("preview");
                img.src = base64; img.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    };

    // Publicar
    document.getElementById("formPublicar").onsubmit = async (e) => {
        e.preventDefault();
        if (isSubmitting) return; 
        isSubmitting = true;
        const btn = document.getElementById("btnLanzar");
        btn.disabled = true; btn.textContent = "Publicando...";

        try {
            const user = auth.currentUser;
            let nombreAutor = "Usuario RobinHub";
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) nombreAutor = userSnap.data().nombre;

            await addDoc(collection(db, "proyectos"), {
                titulo: document.getElementById("titulo").value,
                descripcion: document.getElementById("descripcion").value,
                imagen: base64,
                nombre: nombreAutor,
                userId: user.uid,
                tags: tagsArray,
                likes: 0,
                likedBy: [],
                createdAt: new Date().toISOString()
            });

            window.location.href = "inicio.html";
        } catch (error) {
            console.error(error);
            alert("Error al publicar.");
            isSubmitting = false; btn.disabled = false;
        }
    };
    // --- LÓGICA DE PERSISTENCIA DE TEMA ---
function aplicarTemaGuardado() {
    const tema = localStorage.getItem('robinTema') || 'claro';
    const body = document.body;
    
    if (tema === 'oscuro') {
        document.documentElement.setAttribute("data-theme", "dark");
        body.style.backgroundImage = "url('oscuro.png')";
    } else {
        document.documentElement.removeAttribute("data-theme");
        body.style.backgroundImage = "url('claro.png')";
    }
}

// Función para cambiar el tema (llámala desde tu botón del menú)
window.toggleTheme = () => {
    const esOscuro = document.documentElement.getAttribute("data-theme") === "dark";
    const nuevoTema = esOscuro ? 'claro' : 'oscuro';
    
    localStorage.setItem('robinTema', nuevoTema);
    aplicarTemaGuardado();
};

// Ejecutar inmediatamente al cargar la página
aplicarTemaGuardado();

// --- FUNCIONES PARA SIDEBAR ---
window.toggleMenu = () => document.getElementById("bodyTag").classList.toggle("menu-open");
window.toggleSubmenu = () => document.getElementById("submenuAjustes").classList.toggle("submenu-active");

// Cerrar sidebar al navegar
function closeMenu() {
    document.getElementById("bodyTag").classList.remove("menu-open");
}

// Configurar sidebar
const DEFAULT_CONFIG = [
    { id: 'tema', label: '🌓 Modo claro/oscuro', visible: true },
    { id: 'notif', label: '🔔 Notificaciones', visible: true },
    { id: 'edit', label: '✏️ Editar', visible: true },
    { id: 'more', label: '⚙️ Más ajustes', visible: true }
];

let menuConfig = JSON.parse(localStorage.getItem('robinMenuConfig')) || DEFAULT_CONFIG;

function renderSubmenu() {
    const container = document.getElementById("submenuAjustes");
    if(!container) return;
    container.innerHTML = "";
    menuConfig.forEach(item => {
        if (item.visible) {
            const a = document.createElement("a");
            a.textContent = item.label;
            a.onclick = () => {
                if (item.id === 'tema') toggleTheme();
                else if (item.id === 'more') { closeMenu(); window.location.href = 'ajustes.html'; }
            };
            container.appendChild(a);
        }
    });
}

renderSubmenu();

// Configurar enlaces de sidebar - cerrar al navegar
const sidebarLinks = document.querySelectorAll('.sidebar a:not(#sideLogout)');
sidebarLinks.forEach(link => {
    link.addEventListener('click', closeMenu);
});

// Configurar enlaces de sidebar especiales
document.getElementById("sidePerfil").onclick = () => { closeMenu(); window.location.href = `perfil.html?uid=${auth.currentUser?.uid}`; };
document.getElementById("sideLogout").onclick = async () => {
    closeMenu();
    await signOut(auth);
    window.location.href = "RobinHub.html";
};

</script>
</body>
</html>
