<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RobinHub - El Bosque</title>
    <style>
        :root { 
            --primary: #1b8246; 
            --accent: #2ecc71;
            --light-green: #e8f5e9;
            --sidebar-width: 300px;
            /* Variables para el Modo Claro/Oscuro */
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #777777;
            --nav-bottom-bg: var(--light-green);
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --overlay: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-card: #1a1a1a;
            --text-main: #f0f0f0;
            --text-secondary: #bbbbbb;
            --nav-bottom-bg: #0d3d21;
            --sidebar-bg: rgba(20, 20, 20, 0.98);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-image: url('claro.png'); 
            background-size: 100% auto; background-repeat: repeat-y; 
            background-attachment: scroll; overflow-x: hidden;
            transition: background-image 0.5s ease;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1; pointer-events: none;
            transition: background 0.5s ease;
        }

        /* --- HEADER --- */
        header { position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-top { background: var(--primary); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .nav-bottom { 
            background: var(--nav-bottom-bg); height: 60px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5% 0 150px; border-bottom: 4px solid var(--accent);
            transition: background 0.5s ease;
        }

        .brand-text-bottom {
            color: var(--primary); font-size: 32px; font-weight: 800;
            margin-left: 40px; letter-spacing: -1px; pointer-events: none; user-select: none;
        }

        .consejo-texto { color: var(--primary); font-size: 15px; font-weight: 600; font-style: italic; }

        /* --- LOGO SAGRADO --- */
        .header-left { position: relative; display: flex; align-items: center; }
        .logo-arquero {
            width: 145px; height: auto; cursor: pointer; z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
            position: absolute; top: -35px; left: 0;
        }

        /* --- FLECHA --- */
        .flecha-container {
            position: absolute; left: 75px; top: 5px;
            width: 80px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2500;
        }
        .flecha { width: 50px; height: 4px; background: #ffffff; box-shadow: 0 0 8px white; border-radius: 2px; position: relative; }
        .flecha::after { content: ''; position: absolute; right: -2px; top: -5px; border-left: 14px solid white; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
        .menu-open .flecha-container { opacity: 1; left: calc(var(--sidebar-width) - 40px); pointer-events: auto; }

        /* --- SIDEBAR IZQUIERDA --- */
        .sidebar {
            height: 100%; width: var(--sidebar-width); position: fixed; top: 0; left: calc(var(--sidebar-width) * -1);
            background: var(--sidebar-bg); backdrop-filter: blur(15px); z-index: 2000;
            transition: 0.5s; box-shadow: 8px 0 30px rgba(0,0,0,0.15); padding-top: 150px;
        }
        .menu-open .sidebar { left: 0; }
        .sidebar a { padding: 18px 35px; text-decoration: none; font-size: 18px; color: var(--text-main); display: block; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { background: var(--light-green); color: var(--primary); transform: translateX(10px); }

        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0, 0, 0, 0.05); }
        .submenu-active { max-height: 500px; }
        .submenu a { padding: 12px 50px; font-size: 15px; opacity: 0.8; }

        /* --- PANEL DE EDICIÓN (DERECHA) --- */
        .edit-panel {
            position: fixed; right: -320px; top: 0; width: 300px; height: 100%;
            background: var(--bg-card); z-index: 4000; transition: 0.4s ease-in-out;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2); padding: 20px; box-sizing: border-box;
            color: var(--text-main);
        }
        .edit-panel.active { right: 0; }
        .edit-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px; border-bottom: 1px solid rgba(128,128,128,0.2); margin-bottom: 5px;
        }
        .edit-item div { display: flex; gap: 5px; align-items: center; }
        .btn-order { background: var(--primary); color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; }

        /* --- GRID Y CONTROLES --- */
        .controls-wrapper { display: flex; align-items: center; gap: 15px; flex-grow: 1; justify-content: flex-end; margin-right: 30px; }
        .search-wrapper { flex-grow: 1; background: rgba(255, 255, 255, 0.2); border-radius: 30px; padding: 8px 20px; display: flex; align-items: center; max-width: 600px; }
        .search-wrapper input { flex-grow: 1; border: none; background: transparent; padding: 8px; outline: none; color: white; font-weight: bold; }
        .search-wrapper input::placeholder { color: rgba(255, 255, 255, 0.7); }
        #sortSelect { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 12px; border-radius: 20px; font-weight: 800; cursor: pointer; margin-left: 10px; flex-shrink: 0; }
        #sortSelect option { background: var(--primary); color: white; }

        .main-container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--bg-card); border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(128,128,128,0.1); transition: 0.3s; cursor: pointer; color: var(--text-main); }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-content { padding: 25px; }
        .tag { display: inline-block; background: var(--light-green); color: var(--primary); font-size: 11px; padding: 3px 10px; border-radius: 15px; font-weight: bold; margin: 5px 5px 0 0; }

        .user-card { background: var(--bg-card); border-radius: 30px; padding: 20px; text-align: center; border: 2px solid var(--primary); transition: 0.3s; cursor: pointer; color: var(--text-main); }



        .edit-panel {
    position: fixed; top: 0; 
    left: calc(var(--sidebar-width) * -1); /* Oculta tras la sidebar 1 */
    width: var(--sidebar-width); height: 100%;
    background: rgba(240, 245, 242, 0.95); /* Color ligeramente distinto */
    backdrop-filter: blur(10px);
    z-index: 1999; /* Por debajo de la sidebar principal (2000) */
    transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
    box-shadow: 5px 0 15px rgba(0,0,0,0.1); 
    padding: 150px 25px 20px 25px; 
    box-sizing: border-box; color: #2c3e50;
}

/* Modo oscuro para la barra de edición */
[data-theme="dark"] .edit-panel {
    background: rgba(30, 35, 32, 0.95);
    color: #f0f0f0;
}

.menu-open .edit-panel.active { left: var(--sidebar-width); }

.edit-item { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 12px; border-bottom: 1px solid rgba(128,128,128,0.2); margin-bottom: 8px;
}

.btn-order { background: var(--primary); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
.btn-order:disabled { opacity: 0.3; cursor: not-allowed; }

/* Variable para el modo oscuro total */
[data-theme="dark"] {
    --bg-card: #1a1a1a;
    --text-main: #f0f0f0;
}


    </style>
</head>
<body id="bodyTag">

<div id="editPanel" class="edit-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3 style="margin:0;">Configurar Menú</h3>
        <button onclick="toggleEditPanel()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-main);">✕</button>
    </div>
    <div id="editList"></div>

</div>

    <a href="#" id="sidePerfil">👤 Mi Perfil</a>
    <a href="inicio.html">🌲 El Bosque</a>

<header>
    <div class="nav-top">
        <div class="header-left">
            <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
            <div class="flecha-container" onclick="toggleMenu()">
                <div class="flecha"></div>
            </div>

    </div>
</header>

<div class="main-container"><div id="grid" class="grid"></div></div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- LÓGICA DE CONFIGURACIÓN DE AJUSTES ---
    const DEFAULT_CONFIG = [
        { id: 'tema', label: '🌓 Modo claro/oscuro', visible: true },
        { id: 'notif', label: '🔔 Notificaciones', visible: true },
        { id: 'edit', label: '✏️ Editar', visible: true },
        { id: 'more', label: '⚙️ Más ajustes', visible: true }
    ];

    let menuConfig = JSON.parse(localStorage.getItem('robinMenuConfig')) || DEFAULT_CONFIG;

    window.toggleSubmenu = () => document.getElementById("submenuAjustes").classList.toggle("submenu-active");
    window.toggleMenu = () => document.getElementById("bodyTag").classList.toggle("menu-open");
    
    window.toggleEditPanel = () => {
        document.getElementById("editPanel").classList.toggle("active");
        renderEditList();
    };

    function renderSubmenu() {

        // --- SISTEMA DE CONFIGURACIÓN Y TEMAS ---
const DEFAULT_CONFIG = [
    { id: 'tema', label: '🌓 Modo claro/oscuro', visible: true, lock: false },
    { id: 'notif', label: '🔔 Notificaciones', visible: true, lock: false },
    { id: 'edit', label: '✏️ Editar', visible: true, lock: true }, 
    { id: 'more', label: '⚙️ Más ajustes', visible: true, lock: true }
];

let menuConfig = JSON.parse(localStorage.getItem('robinMenuConfig')) || DEFAULT_CONFIG;

window.toggleEditPanel = () => {
    document.getElementById("editPanel").classList.toggle("active");
    renderEditList();
};

window.toggleTheme = () => {
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    if (isDark) {
        document.documentElement.removeAttribute("data-theme");
        document.body.style.backgroundImage = "url('claro.png')";
    } else {
        document.documentElement.setAttribute("data-theme", "dark");
        document.body.style.backgroundImage = "url('oscuro.png')";
    }
};

function renderSubmenu() {
    const container = document.getElementById("submenuAjustes");
    if(!container) return;
    container.innerHTML = "";
    menuConfig.forEach(item => {
        if (item.visible) {
            const a = document.createElement("a");
            a.textContent = item.label;
            a.onclick = () => {
                if (item.id === 'tema') toggleTheme();
                else if (item.id === 'edit') toggleEditPanel();
                else if (item.id === 'more') window.location.href = 'ajustes.html';
            };
            container.appendChild(a);
        }
    });
}

function renderEditList() {
    const list = document.getElementById("editList");
    list.innerHTML = "";
    menuConfig.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "edit-item";
        div.innerHTML = `
            <span style="font-size:14px;">${item.label}</span>
            <div>
                <button class="btn-order" onclick="moveItem(${index}, -1)">↑</button>
                <button class="btn-order" onclick="moveItem(${index}, 1)">↓</button>
                <input type="checkbox" ${item.visible ? 'checked' : ''} ${item.lock ? 'disabled' : ''} onchange="toggleVis(${index})">
            </div>`;
        list.appendChild(div);
    });
}

window.moveItem = (index, dir) => {
    const newIdx = index + dir;
    if (newIdx >= 0 && newIdx < menuConfig.length) {
        [menuConfig[index], menuConfig[newIdx]] = [menuConfig[newIdx], menuConfig[index]];
        localStorage.setItem('robinMenuConfig', JSON.stringify(menuConfig));
        renderSubmenu(); renderEditList();
    }
};

window.toggleVis = (index) => {
    if (!menuConfig[index].lock) {
        menuConfig[index].visible = !menuConfig[index].visible;
        localStorage.setItem('robinMenuConfig', JSON.stringify(menuConfig));
        renderSubmenu();
    }
};

// Ejecutar al cargar para pintar el menú
renderSubmenu();

        const container = document.getElementById("submenuAjustes");
        container.innerHTML = "";
        menuConfig.forEach(item => {
            if (item.visible) {
                const a = document.createElement("a");
                a.textContent = item.label;
                a.onclick = () => {
                    if (item.id === 'tema') toggleTheme();
                    else if (item.id === 'edit') toggleEditPanel();
                    else if (item.id === 'more') window.location.href = 'ajustes.html';
                };
                container.appendChild(a);
            }
        });
    }

    function renderEditList() {
        const list = document.getElementById("editList");
        list.innerHTML = "";
        menuConfig.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "edit-item";
            div.innerHTML = `
                <span>${item.label}</span>
                <div>
                    <button class="btn-order" onclick="moveItem(${index}, -1)">↑</button>
                    <button class="btn-order" onclick="moveItem(${index}, 1)">↓</button>
                    <input type="checkbox" ${item.visible ? 'checked' : ''} onchange="toggleVis(${index})">
                </div>
            `;
            list.appendChild(div);
        });
    }

    window.moveItem = (index, dir) => {
        const newIdx = index + dir;
        if (newIdx >= 0 && newIdx < menuConfig.length) {
            [menuConfig[index], menuConfig[newIdx]] = [menuConfig[newIdx], menuConfig[index]];
            saveConfig();
        }
    };

    window.toggleVis = (index) => {
        menuConfig[index].visible = !menuConfig[index].visible;
        saveConfig();
    };

    function saveConfig() {
        localStorage.setItem('robinMenuConfig', JSON.stringify(menuConfig));
        renderSubmenu();
        renderEditList();
    }

    // --- TEMA ---
    let isDark = false;
    window.toggleTheme = () => {
        isDark = !isDark;
        document.body.style.backgroundImage = isDark ? "url('oscuro.png')" : "url('claro.png')";
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "");
    };

    // --- FIREBASE Y RENDER (INTACTO ROBINHUB 9) ---
    const tips = ["¿Sabías que puedes buscar por #etiquetas?", "Pulsa en el arquero para abrir el menú lateral.", "Usa @nombre para buscar inventores."];
    document.getElementById("randomTip").textContent = tips[Math.floor(Math.random() * tips.length)];

    let allProjects = [];
    let allUsers = {};
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");

    onSnapshot(collection(db, "users"), (snap) => {
        snap.forEach(doc => { allUsers[doc.id] = doc.data(); });
        render();
    });

    onSnapshot(collection(db, "proyectos"), (snap) => {
        allProjects = [];
        snap.forEach(doc => { allProjects.push({ id: doc.id, ...doc.data() }); });
        render();
    });

    function render() {
        const query = searchInput.value.toLowerCase().trim();
        const gridBox = document.getElementById("grid");
        gridBox.innerHTML = "";

        if (query.startsWith("@")) {
            const userQuery = query.substring(1);
            const seenUsers = new Set();
            Object.keys(allUsers).forEach(uid => {
                const u = allUsers[uid];
                if (!seenUsers.has(uid) && (u.nombre || "").toLowerCase().includes(userQuery)) {
                    const div = document.createElement("div");
                    div.className = "user-card";
                    div.innerHTML = `
                        <img src="${u.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid white; margin-bottom:10px;">
                        <h3>@${u.nombre}</h3>
                    `;
                    div.onclick = () => window.location.href = `perfil.html?uid=${uid}`;
                    gridBox.appendChild(div);
                    seenUsers.add(uid);
                }
            });
            return;
        }

        let filtered = allProjects.filter(p => {
            const title = (p.titulo || "").toLowerCase();
            const tags = (p.tags || []).map(t => t.toLowerCase());
            if (query.startsWith("#")) return tags.some(t => t.includes(query.substring(1)));
            return title.includes(query) || tags.some(t => t.includes(query));
        });

        const sortMode = sortSelect.value;
        if (sortMode === "popular") filtered.sort((a,b) => (b.visitas || 0) - (a.visitas || 0));
        else if (sortMode === "top") filtered.sort((a,b) => (b.likes || 0) - (a.likes || 0));
        else filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        filtered.forEach(p => {
            const creator = allUsers[p.userId] || { nombre: "Robin" };
            const div = document.createElement("div");
            div.className = "card";
            const tagsHtml = (p.tags || []).map(t => `<span class="tag">#${t}</span>`).join("");
            div.innerHTML = `
                <img src="${p.imagen}">
                <div class="card-content">
                    <span style="color:var(--primary); font-weight:bold;">@${creator.nombre}</span>
                    <h3 style="margin:10px 0 5px 0;">${p.titulo}</h3>
                    <div style="margin-bottom:15px;">${tagsHtml}</div>
                    <div style="font-size:13px; color:var(--text-secondary);">❤️ ${p.likes || 0} | 👁️ ${p.visitas || 0}</div>
                </div>`;
            div.onclick = () => window.location.href = `proyecto.html?id=${p.id}`;
            gridBox.appendChild(div);
        });
    }

    searchInput.addEventListener("input", render);
    sortSelect.addEventListener("change", render);
    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "login.html";
        else {
            const goToPerfil = () => window.location.href = `perfil.html?uid=${user.uid}`;
            document.getElementById("sidePerfil").onclick = goToPerfil;
        }
    });

    document.getElementById("sideLogout").onclick = async () => {
        await signOut(auth);
        window.location.href = "RobinHub.html";
    };

    // Inicialización del menú
    renderSubmenu();

    // --- LÓGICA DE PERSISTENCIA DE TEMA ---
function aplicarTemaGuardado() {
    const tema = localStorage.getItem('robinTema') || 'claro';
    const body = document.body;
    
    if (tema === 'oscuro') {
        document.documentElement.setAttribute("data-theme", "dark");
        body.style.backgroundImage = "url('oscuro.png')";
    } else {
        document.documentElement.removeAttribute("data-theme");
        body.style.backgroundImage = "url('claro.png')";
    }
}

// Función para cambiar el tema (llámala desde tu botón del menú)
window.toggleTheme = () => {
    const esOscuro = document.documentElement.getAttribute("data-theme") === "dark";
    const nuevoTema = esOscuro ? 'claro' : 'oscuro';
    
    localStorage.setItem('robinTema', nuevoTema);
    aplicarTemaGuardado();
};

// Ejecutar inmediatamente al cargar la página
aplicarTemaGuardado();

</script>
