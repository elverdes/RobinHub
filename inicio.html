<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RobinHub - El Bosque</title>
    <link rel="stylesheet" href="./shared/styles.css">
    <style>
        .main-container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--bg-card); border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(128,128,128,0.1); transition: 0.3s; cursor: pointer; color: var(--text-main); }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-content { padding: 25px; }
        .tag { display: inline-block; background: var(--light-green); color: var(--primary); font-size: 11px; padding: 3px 10px; border-radius: 15px; font-weight: bold; margin: 5px 5px 0 0; }
        .user-card { background: var(--bg-card); border-radius: 30px; padding: 20px; text-align: center; border: 2px solid var(--primary); transition: 0.3s; cursor: pointer; color: var(--text-main); }
    </style>
</head>
<body id="bodyTag">
    <div id="editPanel" class="edit-panel" hidden>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h3 style="margin:0;">Configurar Menú</h3>
            <button onclick="toggleEditPanel()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-main);">✕</button>
        </div>
        <div id="editList"></div>
        <button onclick="toggleEditPanel()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; margin-top:20px; font-weight:bold; cursor:pointer;">Cerrar y Guardar</button>
    </div>

    <div id="mySidebar" class="sidebar">
        <a href="#" id="sidePerfil">👤 Mi Perfil</a>
        <a href="inicio.html">🌲 El Bosque</a>
        <a href="publicar.html">🚀 Publicar Idea</a>
        <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin:15px 25px;">
        <a href="#" class="submenu-toggle">⚙️ Ajustes ▾</a>
        <div id="submenuAjustes" class="submenu"></div>
        <a href="sugerencias.html">💡 Sugerencias</a>
        <a href="#" id="sideLogout" style="color: #ff4757;">🚪 Cerrar Sesión</a>
    </div>

    <header>
        <div class="nav-top">
            <div class="header-left">
                <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
                <div class="flecha-container" onclick="toggleMenu()">
                    <div class="flecha"></div>
                </div>
            </div>
            <div class="controls-wrapper">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Busca @usuario, #etiqueta o idea..." aria-label="Buscar contenido en RobinHub">
                    <select id="sortSelect" aria-label="Ordenar resultados">
                        <option value="recent">Recientes</option>
                        <option value="popular">Populares</option>
                        <option value="top">Mejores</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="nav-bottom">
            <div><span class="brand-text-bottom">obinHub</span></div>
            <div class="consejo-texto" id="randomTip">Cargando saberes del bosque...</div>
        </div>
    </header>

    <div class="main-container"><div id="grid" class="grid"></div></div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { addDoc, collection, doc, getDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { applySavedTheme, toggleTheme, toggleMenu, toggleSubmenu, loadMenuConfig, setupSidebar, createEditPanel, renderSubmenu } from "./shared/common.js";

        const tips = [
            "¿Sabías que puedes buscar por #etiquetas?",
            "Pulsa en el arquero para abrir el menú lateral.",
            "Usa @nombre para buscar inventores."
        ];

        let currentUser = null;
        const menuConfig = loadMenuConfig();

        async function requestChat(toUid, projectId, projectTitle) {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (toUid === currentUser.uid) {
                alert('No puedes solicitar chat a tu propia publicación.');
                return;
            }

            const message = prompt(`Escribe un mensaje para solicitar chat con el autor de "${projectTitle}":`,
                'Hola, me interesa tu proyecto y me gustaría hablar contigo.');
            if (!message || !message.trim()) return;

            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            const fromName = userDoc.exists() ? userDoc.data().nombre || currentUser.email : currentUser.email;

            await addDoc(collection(db, 'chatRequests'), {
                fromUid: currentUser.uid,
                toUid,
                projectId,
                projectTitle,
                message: message.trim(),
                status: 'pending',
                createdAt: serverTimestamp(),
                fromName,
            });

            alert('Solicitud de chat enviada. El autor podrá aceptarla o rechazarla desde su perfil.');
        }

        window.toggleMenu = toggleMenu;
        window.toggleSubmenu = toggleSubmenu;
        window.toggleTheme = toggleTheme;
        window.toggleEditPanel = () => {
            const editPanel = document.getElementById('editPanel');
            if (!editPanel) return;
            const active = editPanel.classList.toggle('active');
            editPanel.hidden = !active;
            renderMenuConfig();
        };

        function renderMenuConfig() {
            renderSubmenu({
                config: menuConfig,
                onEdit: window.toggleEditPanel,
                onMore: () => window.location.href = 'ajustes.html'
            });
            createEditPanel(menuConfig, 'editList', renderMenuConfig);
        }

        applySavedTheme();
        document.getElementById('randomTip').textContent = tips[Math.floor(Math.random() * tips.length)];

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }
            currentUser = user;
            setupSidebar({
                config: menuConfig,
                onPerfil: () => { window.location.href = `perfil.html?uid=${currentUser.uid}`; },
                onLogout: async () => {
                    await signOut(auth);
                    window.location.href = "RobinHub.html";
                },
                onEdit: window.toggleEditPanel,
                onMore: () => window.location.href = 'ajustes.html'
            });
            renderMenuConfig();
            render();
        });

        let allUsers = {};
        let allProjects = [];

        const searchInput = document.getElementById("searchInput");
        const sortSelect = document.getElementById("sortSelect");

        onSnapshot(collection(db, "users"), (snap) => {
            snap.forEach(doc => { allUsers[doc.id] = doc.data(); });
            render();
        });

        onSnapshot(collection(db, "proyectos"), (snap) => {
            allProjects = [];
            snap.forEach(doc => { allProjects.push({ id: doc.id, ...doc.data() }); });
            render();
        });

        function render() {
            const query = searchInput.value.toLowerCase().trim();
            const gridBox = document.getElementById("grid");
            gridBox.innerHTML = "";

            if (query.startsWith("@")) {
                const userQuery = query.substring(1);
                Object.keys(allUsers).forEach(uid => {
                    const u = allUsers[uid];
                    if ((u.nombre || "").toLowerCase().includes(userQuery)) {
                        const div = document.createElement("div");
                        div.className = "user-card";
                        div.innerHTML = `
                            <img src="${u.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid white; margin-bottom:10px;">
                            <h3>@${u.nombre}</h3>
                        `;
                        div.onclick = () => window.location.href = `perfil.html?uid=${uid}`;
                        gridBox.appendChild(div);
                    }
                });
                return;
            }

            const filtered = allProjects.filter(p => {
                const title = (p.titulo || "").toLowerCase();
                const tags = (p.tags || []).map(t => t.toLowerCase());
                if (query.startsWith("#")) return tags.some(t => t.includes(query.substring(1)));
                return title.includes(query) || tags.some(t => t.includes(query));
            });

            if (sortSelect.value === "popular") {
                filtered.sort((a, b) => (b.visitas || 0) - (a.visitas || 0));
            } else if (sortSelect.value === "top") {
                filtered.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            } else {
                filtered.sort((a, b) => {
                    const dateA = new Date(a.createdAt || a.fecha || 0).getTime();
                    const dateB = new Date(b.createdAt || b.fecha || 0).getTime();
                    return dateB - dateA;
                });
            }

            filtered.forEach(p => {
                const creator = allUsers[p.userId] || { nombre: "Robin" };
                const div = document.createElement("div");
                div.className = "card";
                const tagsHtml = (p.tags || []).map(t => `<span class="tag">#${t}</span>`).join("");
                const safeTitle = (p.titulo || "").replace(/"/g, '“').replace(/'/g, "’");
                const requestButton = ""; // Solicitar chat moved to project detail view
                div.innerHTML = `
                    <img src="${p.imagen}">
                    <div class="card-content">
                        <span style="color:var(--primary); font-weight:bold;">@${creator.nombre}</span>
                        <h3 style="margin:10px 0 5px 0;">${p.titulo}</h3>
                        <div style="margin-bottom:15px;">${tagsHtml}</div>
                        <div style="display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
                            <div style="font-size:13px; color:var(--text-secondary);">❤️ ${p.likes || 0} | 👁️ ${p.visitas || 0}</div>
                        </div>
                    </div>`;
                div.onclick = () => window.location.href = `proyecto.html?id=${p.id}`;
                gridBox.appendChild(div);
            });
        }

        searchInput.addEventListener("input", render);
        sortSelect.addEventListener("change", render);
    </script>
</body>
</html>
