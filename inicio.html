<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RobinHub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

header {
    background: #1b8246;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav a {
    color: white;
    margin-left: 10px;
    text-decoration: none;
    background: rgba(255,255,255,0.2);
    padding: 6px 10px;
    border-radius: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 10px;
}

.tag {
    display: inline-block;
    background: #e9f8ef;
    color: #1b8246;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 12px;
    margin: 2px;
}
</style>
</head>

<body>

<header>
<h2>RobinHub</h2>

<div class="nav">
<a id="perfilBtn">Mi perfil</a>
<a href="publicar.html">Publicar</a>
<a id="logoutBtn">Cerrar sesión</a>
</div>
</header>

<div class="grid" id="grid"></div>

<script type="module">

import { db, auth } from "./firebase.js";
import {
    collection, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
    onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const grid = document.getElementById("grid");

// 🔐 sesión
onAuthStateChanged(auth, (user)=>{
    if(!user){
        window.location.href="login.html";
    } else {
        document.getElementById("perfilBtn").onclick = ()=>{
            window.location.href = "perfil.html?uid="+user.uid;
        };
    }
});

// 🚪 logout
document.getElementById("logoutBtn").onclick = async ()=>{
    await signOut(auth);
    window.location.href="login.html";
};

// 📦 cargar proyectos
onSnapshot(collection(db,"proyectos"), (snapshot)=>{

    grid.innerHTML="";

    snapshot.forEach(docItem=>{

        const p = docItem.data();

        const card = document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <img src="${p.imagen || 'https://via.placeholder.com/400x300'}">
            <div class="card-content">
                <strong>${p.nombre || "Anon"}</strong>
                <h3>${p.titulo}</h3>
                <div>
                    ${(p.tags || []).map(t=>`<span class="tag">#${t}</span>`).join("")}
                </div>
            </div>
        `;

        card.onclick=()=>{
            window.location.href=`proyecto.html?id=${docItem.id}`;
        };

        grid.appendChild(card);

    });

});

</script>

</body>
</html>
