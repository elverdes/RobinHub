<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión - RobinHub</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    width: 100%;
    max-width: 400px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

h2 { 
    color:#1b8246; 
    text-align:center; 
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:6px;
}

button {
    width:100%;
    padding:12px;
    font-size:1rem;
    background:#1b8246;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#146a38;
}

p {
    text-align:center;
    margin-top:20px;
}

a {
    color:#1b8246;
    text-decoration:none;
}

/* --- ESTILOS PARA MODO OSCURO --- */
[data-theme="dark"] {
    --bg-card: #1a1a1a;
    --text-main: #f0f0f0;
    --light-green: #0d3d21; /* Verde muy oscuro para el fondo del nav-bottom */
}

/* Aplicación del fondo oscuro al overlay */
[data-theme="dark"] body::after {
    background: rgba(0, 0, 0, 0.6) !important;
}

/* Si tienes tarjetas de sugerencias o publicar, añade esto para que cambien de color */
[data-theme="dark"] .sugerencia-card, 
[data-theme="dark"] .publicar-container,
[data-theme="dark"] .ajustes-card {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
    border-color: rgba(255,255,255,0.1);
}


</style>
</head>
<body>

<div class="container">

<h2>Iniciar Sesión</h2>

<form onsubmit="handleLogin(event)">
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
</form>


<script type="module">

import { auth } from "./firebase.js";
import { signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.handleLogin = function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
    .then(() => {
        window.location.href = "inicio.html";
    })
    .catch(() => {
        alert("Credenciales incorrectas");
    });
}
// --- LÓGICA DE PERSISTENCIA DE TEMA ---
function aplicarTemaGuardado() {
    const tema = localStorage.getItem('robinTema') || 'claro';
    const body = document.body;
    
    if (tema === 'oscuro') {
        document.documentElement.setAttribute("data-theme", "dark");
        body.style.backgroundImage = "url('oscuro.png')";
    } else {
        document.documentElement.removeAttribute("data-theme");
        body.style.backgroundImage = "url('claro.png')";
    }
}

// Función para cambiar el tema (llámala desde tu botón del menú)
window.toggleTheme = () => {
    const esOscuro = document.documentElement.getAttribute("data-theme") === "dark";
    const nuevoTema = esOscuro ? 'claro' : 'oscuro';
    
    localStorage.setItem('robinTema', nuevoTema);
    aplicarTemaGuardado();
};

// Ejecutar inmediatamente al cargar la página
aplicarTemaGuardado();

</script>

<p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
</div>

</body>
</html>
