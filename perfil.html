<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - RobinHub</title>
    <style>
        :root { 
            --primary: #1b8246; 
            --accent: #2ecc71;
            --light-green: #e8f5e9;
            --sidebar-width: 300px;
            /* Variables para el Modo Claro/Oscuro */
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #777777;
            --nav-bottom-bg: var(--light-green);
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --overlay: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --bg-card: #1a1a1a;
            --text-main: #f0f0f0;
            --text-secondary: #bbbbbb;
            --nav-bottom-bg: #0d3d21;
            --sidebar-bg: rgba(20, 20, 20, 0.98);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-image: url('claro.png'); 
            background-size: 100% auto; background-repeat: repeat-y; 
            background-attachment: scroll; overflow-x: hidden;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); z-index: -1; pointer-events: none;
            transition: background 0.5s ease;
        }

        /* --- HEADER --- */
        header { position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-top { background: var(--primary); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        .nav-bottom { 
            background: var(--nav-bottom-bg); height: 60px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5% 0 150px; border-bottom: 4px solid var(--accent);
            transition: background 0.5s ease;
        }

        .brand-text-bottom {
            color: var(--primary); font-size: 32px; font-weight: 800;
            margin-left: 40px; letter-spacing: -1px; pointer-events: none; user-select: none;
        }

        .consejo-texto { color: var(--primary); font-size: 15px; font-weight: 600; font-style: italic; }

        /* --- GRID Y CONTROLES --- */
        .controls-wrapper { display: flex; align-items: center; gap: 15px; flex-grow: 1; margin-left: 100px; }
        .back-link { text-decoration: none; color: white; font-weight: bold; font-size: 14px; display: inline-block; }
        .profile-header { background: var(--bg-card); padding: 40px; text-align: center; border-bottom: 1px solid #ddd; color: var(--text-main); }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .btn-edit { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none; margin-top: 15px; }

        /* Botones con forma de carpeta */
        .btn-folder {
            --folder-bg: var(--primary);
            position: relative;
            background: var(--folder-bg);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 18px rgba(27,130,70,0.12);
        }

        .btn-folder::before {
            content: "";
            position: absolute;
            left: 12px;
            top: -10px;
            width: 46px;
            height: 18px;
            background: rgba(255,255,255,0.09);
            border-radius: 4px 6px 0 0;
            transform: translateY(0);
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.04);
        }

        .btn-folder.primary { background: var(--primary); }
        .btn-folder.chats { background: linear-gradient(180deg, var(--primary), #15713a); }

        .btn-folder .title { text-align: center; display: inline-block; min-width: 80px; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); border-radius: 10px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--text-main); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 10px; }

        .chat-card {
            background: var(--bg-card);
            border: 1px solid rgba(27,130,70,0.12);
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.08);
        }

        .chat-card h4 {
            margin: 0 0 10px 0;
            color: var(--primary);
        }

        .chat-card p {
            margin: 6px 0;
            color: var(--text-secondary);
        }

        .chat-request-meta {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .chat-request-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chat-list { display: grid; gap: 16px; }

        .chat-summary {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chat-status { color: var(--primary); font-weight: 700; }

        /* --- LOGO SAGRADO --- */
        .header-left { position: relative; display: flex; align-items: center; }
        .logo-arquero {
            width: 145px; height: auto; cursor: pointer; z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
            position: absolute; top: -35px; left: 0;
        }

        /* --- FLECHA --- */
        .flecha-container {
            position: absolute; left: 75px; top: 5px;
            width: 80px; height: 50px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2500;
        }
        .flecha { width: 50px; height: 4px; background: #ffffff; box-shadow: 0 0 8px white; border-radius: 2px; position: relative; }
        .flecha::after { content: ''; position: absolute; right: -2px; top: -5px; border-left: 14px solid white; border-top: 6px solid transparent; border-bottom: 6px solid transparent; }
        .menu-open .flecha-container { opacity: 1; left: calc(var(--sidebar-width) - 40px); pointer-events: auto; }

        /* --- SIDEBAR IZQUIERDA --- */
        .sidebar {
            height: 100%; width: var(--sidebar-width); position: fixed; top: 0; left: calc(var(--sidebar-width) * -1);
            background: var(--sidebar-bg); backdrop-filter: blur(15px); z-index: 2000;
            transition: 0.5s; box-shadow: 8px 0 30px rgba(0,0,0,0.15); padding-top: 150px;
        }
        .menu-open .sidebar { left: 0; }
        .sidebar a { padding: 18px 35px; text-decoration: none; font-size: 18px; color: var(--text-main); display: block; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .sidebar a:hover { background: var(--light-green); color: var(--primary); transform: translateX(10px); }

        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0, 0, 0, 0.05); }
        .submenu-active { max-height: 500px; }
        .submenu a { padding: 12px 50px; font-size: 15px; opacity: 0.8; }
[data-theme="dark"] {
    --bg-card: #1a1a1a;
    --text-main: #f0f0f0;
    --light-green: #0d3d21; /* Verde muy oscuro para el fondo del nav-bottom */
}

/* Aplicación del fondo oscuro al overlay */
[data-theme="dark"] body::after {
    background: var(--overlay) !important;
}

/* Si tienes tarjetas de sugerencias o publicar, añade esto para que cambien de color */
[data-theme="dark"] .sugerencia-card, 
[data-theme="dark"] .publicar-container,
[data-theme="dark"] .ajustes-card {
    background: var(--bg-card) !important;
    color: var(--text-main) !important;
    border-color: rgba(255,255,255,0.1);
}


    </style>
</head>
<body id="bodyTag">

<header>
    <div class="nav-top">
        <div class="header-left">
            <img src="182 sin título_20260415212120.png" class="logo-arquero" onclick="toggleMenu()">
            <div class="flecha-container" onclick="toggleMenu()">
                <div class="flecha"></div>
            </div>
        </div>
    </div>
    <div class="nav-bottom">
        <div><span class="brand-text-bottom">obinHub</span></div>
        <div class="consejo-texto" id="randomTip">Cada perfil es una historia única...</div>
    </div>
</header>

<div id="mySidebar" class="sidebar">
    <a href="#" id="sidePerfil">👤 Mi Perfil</a>
    <a href="inicio.html">🌲 El Bosque</a>
    <a href="publicar.html">🚀 Publicar Idea</a>
    <hr style="border:0; border-top:1px solid rgba(128,128,128,0.2); margin:15px 25px;">
    
    <a class="submenu-toggle" onclick="event.preventDefault(); event.stopPropagation(); toggleSubmenu()">⚙️ Ajustes ▾</a>
    <div id="submenuAjustes" class="submenu"></div>

    <a href="sugerencias.html">💡 Sugerencias</a>
    <a href="#" id="sideLogout" style="color: #ff4757;">🚪 Cerrar Sesión</a>
</div>

<div class="profile-header">
    <img id="user-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">
    <h1 id="user-name">Cargando...</h1>
    <p id="user-bio">...</p>
    <div style="margin-top:12px; display:flex; gap:14px; justify-content:center;">
        <button id="editBtn" class="btn-edit" onclick="location.href='editar-perfil.html'">Editar mi perfil</button>
        <button id="btnMyProjects" class="btn-folder primary" style="display:none;">📁 <span class="title">Mis proyectos</span></button>
        <button id="btnChats" class="btn-folder chats" style="display:none;">💬 <span class="title">Chats</span></button>
    </div>
</div>

<div id="projectsSection" class="container" style="display:none;">
    <h3>Proyectos de este usuario</h3>
    <div id="user-projects" class="grid"></div>
    </div>

<div class="container" id="requestSection" style="display:none; margin-top:40px;">
    <h3>Solicitudes de chat</h3>
    <div id="chatRequests" class="chat-list"></div>
</div>

<div class="container" id="myChatsSection" style="display:none; margin-top:40px;">
    <h3>Mis chats</h3>
    <div id="chatList" class="chat-list"></div>
</div>

<script type="module">
    import { db, auth } from "./firebase.js";
    import { addDoc, collection, doc, getDoc, getDocs, orderBy, query, serverTimestamp, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- CONSEJOS ALEATORIOS ---
    const tips = [
        "Los perfiles completos atraen más colaboradores.",
        "Comparte tu visión y tus objetivos.",
        "Un buen perfil es tu carta de presentación.",
        "Actualiza tu información regularmente.",
        "La transparencia genera confianza."
    ];
    document.getElementById("randomTip").textContent = tips[Math.floor(Math.random() * tips.length)];

    const viewUid = new URLSearchParams(window.location.search).get("uid");
    let userProjects = [];

    onAuthStateChanged(auth, async (user) => {
        if (!user) return; // need an authenticated user to proceed

        const targetUid = viewUid || user.uid;

        // Mostrar botón editar solo si es MI perfil
        if (user.uid === targetUid) document.getElementById("editBtn").style.display = "inline-block";

        // Cargar datos
        const userDoc = await getDoc(doc(db, "users", targetUid));
        if (userDoc.exists()) {
            const d = userDoc.data();
            document.getElementById("user-name").textContent = d.nombre || "Usuario";
            document.getElementById("user-bio").textContent = d.bio || "Sin descripción";
            if (d.foto) document.getElementById("user-img").src = d.foto;
        }

        // Cargar proyectos
        const q = query(collection(db, "proyectos"), where("userId", "==", targetUid));
        const snap = await getDocs(q);
        const box = document.getElementById("user-projects");
        box.innerHTML = '';
        userProjects = [];
        snap.forEach(d => {
            const p = d.data();
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="${p.imagen}"><div class="card-info"><h4>${p.titulo}</h4></div>`;
            card.onclick = () => location.href = `proyecto.html?id=${d.id}`;
            box.appendChild(card);
            userProjects.push(d.id);
        });
        // Controls: show folder buttons only for my profile, otherwise show projects
        const btnMyProjects = document.getElementById('btnMyProjects');
        const btnChats = document.getElementById('btnChats');
        const projectsSection = document.getElementById('projectsSection');

        if (user.uid === targetUid) {
            // Profile owner: show controls, hide sections by default
            document.getElementById("editBtn").style.display = "inline-block";
            btnMyProjects.style.display = 'inline-block';
            btnChats.style.display = 'inline-block';
            projectsSection.style.display = 'none';
            document.getElementById('requestSection').style.display = 'none';
            document.getElementById('myChatsSection').style.display = 'none';

            btnMyProjects.onclick = () => {
                const isVisible = projectsSection.style.display === 'block';
                projectsSection.style.display = isVisible ? 'none' : 'block';
                // hide chats when showing projects
                if (!isVisible) {
                    document.getElementById('requestSection').style.display = 'none';
                    document.getElementById('myChatsSection').style.display = 'none';
                }
            };

            btnChats.onclick = async () => {
                // snapshot my projects to localStorage
                try { localStorage.setItem('myProjectsSnapshot', JSON.stringify(userProjects || [])); } catch (e) {}
                await loadChatRequests(targetUid);
                await loadUserChats(targetUid);
                document.getElementById('requestSection').style.display = 'block';
                document.getElementById('myChatsSection').style.display = 'block';
                projectsSection.style.display = 'none';
            };

        } else {
            // Viewing someone else's profile: show projects, hide chats and controls
            btnMyProjects.style.display = 'none';
            btnChats.style.display = 'none';
            projectsSection.style.display = 'block';
            document.getElementById('requestSection').style.display = 'none';
            document.getElementById('myChatsSection').style.display = 'none';
        }
    });

    async function loadChatRequests(uid) {
        const q = query(collection(db, 'chatRequests'), where('toUid', '==', uid), where('status', '==', 'pending'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        const container = document.getElementById('chatRequests');
        container.innerHTML = '';

        snap.forEach(docReq => {
            const req = docReq.data();
            const card = document.createElement('div');
            card.className = 'chat-card';
            card.innerHTML = `
                <div class="chat-request-meta">
                    <div><strong>${req.fromName || 'Usuario'}</strong> solicitó chat por <strong>${req.projectTitle || 'un proyecto'}</strong></div>
                    <div class="chat-status">Pendiente</div>
                </div>
                <p>${req.message}</p>
                <div class="chat-request-actions">
                    <button class="btn-action" id="accept-${docReq.id}">Aceptar</button>
                    <button class="btn-danger" id="reject-${docReq.id}">Rechazar</button>
                </div>
            `;

            container.appendChild(card);

            document.getElementById(`accept-${docReq.id}`).onclick = async () => {
                await acceptChatRequest(docReq.id, req);
                await loadChatRequests(uid);
                await loadUserChats(uid);
            };
            document.getElementById(`reject-${docReq.id}`).onclick = async () => {
                await rejectChatRequest(docReq.id);
                await loadChatRequests(uid);
            };
        });
    }

    async function loadUserChats(uid) {
        const q = query(collection(db, 'chats'), where('participants', 'array-contains', uid), orderBy('lastMessageAt', 'desc'));
        const snap = await getDocs(q);
        const container = document.getElementById('chatList');
        container.innerHTML = '';

        snap.forEach(async chatDoc => {
            const chat = chatDoc.data();
            const otherUid = (chat.participants || []).find(id => id !== uid) || uid;
            const otherDoc = await getDoc(doc(db, 'users', otherUid));
            const otherName = otherDoc.exists() ? otherDoc.data().nombre || 'Usuario' : 'Usuario';

            const card = document.createElement('div');
            card.className = 'chat-card';
            card.innerHTML = `
                <div class="chat-request-meta">
                    <div><strong>Chat con ${otherName}</strong></div>
                    <div class="chat-status">${chat.projectTitle || 'Conversación'}</div>
                </div>
                <p>${chat.lastMessage || 'Sin mensajes aún'}</p>
                <div class="chat-summary">Última vez: ${chat.lastMessageAt ? new Date(chat.lastMessageAt.toDate()).toLocaleString() : 'No hay actividad'}</div>
            `;
            card.onclick = () => location.href = `chat.html?chatId=${chatDoc.id}`;
            container.appendChild(card);
        });
    }

    async function acceptChatRequest(requestId, req) {
        const chatRef = await addDoc(collection(db, 'chats'), {
            participants: [req.fromUid, req.toUid],
            projectId: req.projectId || null,
            projectTitle: req.projectTitle || null,
            createdAt: serverTimestamp(),
            lastMessage: req.message || 'Solicitud aceptada',
            lastMessageAt: serverTimestamp(),
        });

        await updateDoc(doc(db, 'chatRequests', requestId), {
            status: 'accepted',
            chatId: chatRef.id,
        });

        await addDoc(collection(db, 'chats', chatRef.id, 'messages'), {
            senderId: req.fromUid,
            text: req.message || 'Hola, quisiera conversar contigo.',
            createdAt: serverTimestamp(),
            type: 'request',
        });

        alert('Solicitud aceptada. Se ha creado el chat y estará disponible en tu perfil.');
    }

    async function rejectChatRequest(requestId) {
        await updateDoc(doc(db, 'chatRequests', requestId), {
            status: 'rejected',
        });
        alert('Solicitud rechazada.');
    }
    // --- LÓGICA DE PERSISTENCIA DE TEMA ---
function aplicarTemaGuardado() {
    const tema = localStorage.getItem('robinTema') || 'claro';
    const body = document.body;
    
    if (tema === 'oscuro') {
        document.documentElement.setAttribute("data-theme", "dark");
        body.style.backgroundImage = "url('oscuro.png')";
    } else {
        document.documentElement.removeAttribute("data-theme");
        body.style.backgroundImage = "url('claro.png')";
    }
}

// Función para cambiar el tema (llámala desde tu botón del menú)
window.toggleTheme = () => {
    const esOscuro = document.documentElement.getAttribute("data-theme") === "dark";
    const nuevoTema = esOscuro ? 'claro' : 'oscuro';
    
    localStorage.setItem('robinTema', nuevoTema);
    aplicarTemaGuardado();
};

// Ejecutar inmediatamente al cargar la página
aplicarTemaGuardado();

// --- FUNCIONES PARA SIDEBAR ---
window.toggleMenu = () => document.getElementById("bodyTag").classList.toggle("menu-open");
window.toggleSubmenu = () => document.getElementById("submenuAjustes").classList.toggle("submenu-active");

// Cerrar sidebar al navegar
function closeMenu() {
    document.getElementById("bodyTag").classList.remove("menu-open");
}

// Configurar sidebar
const DEFAULT_CONFIG = [
    { id: 'tema', label: '🌓 Modo claro/oscuro', visible: true },
    { id: 'notif', label: '🔔 Notificaciones', visible: true },
    { id: 'edit', label: '✏️ Editar', visible: true },
    { id: 'more', label: '⚙️ Más ajustes', visible: true }
];

let menuConfig = JSON.parse(localStorage.getItem('robinMenuConfig')) || DEFAULT_CONFIG;

function renderSubmenu() {
    const container = document.getElementById("submenuAjustes");
    if(!container) return;
    container.innerHTML = "";
    menuConfig.forEach(item => {
        if (item.visible) {
            const a = document.createElement("a");
            a.textContent = item.label;
            a.onclick = () => {
                if (item.id === 'tema') toggleTheme();
                else if (item.id === 'more') { closeMenu(); window.location.href = 'ajustes.html'; }
            };
            container.appendChild(a);
        }
    });
}

renderSubmenu();

// Configurar enlaces de sidebar - cerrar al navegar
const sidebarLinks = document.querySelectorAll('.sidebar a:not(#sideLogout):not(.submenu-toggle)');
sidebarLinks.forEach(link => {
    link.addEventListener('click', closeMenu);
});

// Configurar enlaces de sidebar especiales
document.getElementById("sidePerfil").onclick = () => { closeMenu(); window.location.href = `perfil.html?uid=${auth.currentUser?.uid}`; };
document.getElementById("sideLogout").onclick = async () => {
    closeMenu();
    await signOut(auth);
    window.location.href = "RobinHub.html";
};

</script>
</body>
</html>
