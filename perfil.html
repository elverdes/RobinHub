<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - RobinHub</title>
    <style>
        body { margin: 0; font-family: Arial; background: #f5f5f5; }
        .header { background: white; padding: 30px; text-align: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #1b8246; }
        .bio-text { color: #666; margin: 10px auto; max-width: 500px; line-height: 1.4; }
        .edit-section { margin-top: 15px; display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 8px 14px; background: #e9f8ef; color: #1b8246; border-radius: 20px; text-decoration: none; font-size: 14px; }
        input, textarea, button { width: 100%; max-width: 400px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: #1b8246; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-edit { background: none; border: 1px solid #1b8246; color: #1b8246; cursor: pointer; width: auto; padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="inicio.html" class="back-btn"> ← Volver </a>
        <img id="avatar" src="https://via.placeholder.com/100">
        <h2 id="nombre">Cargando...</h2>
        <p id="bioDisplay" class="bio-text"></p>
        
        <button id="toggleEdit" class="btn-edit">Editar Perfil</button>

        <div id="editSection" class="edit-section">
            <input type="text" id="nuevoAvatar" placeholder="URL de nueva foto">
            <textarea id="nuevaBio" placeholder="Escribe algo sobre ti..."></textarea>
            <button class="btn-save" onclick="guardarCambios()">Guardar cambios</button>
        </div>
    </div>

    <h3 style="text-align: center; margin-top: 30px;">Proyectos publicados</h3>
    <div class="grid" id="projectsGrid"></div>

    <script type="module">
        import { db, auth } from "./firebase.js";
        import { doc, getDoc, collection, query, where, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const params = new URLSearchParams(window.location.search);
        const uidParam = params.get("uid");

        const nombreEl = document.getElementById("nombre");
        const avatarEl = document.getElementById("avatar");
        const bioEl = document.getElementById("bioDisplay");
        const grid = document.getElementById("projectsGrid");

        // 1. Cargar datos del perfil
        async function cargarPerfil() {
            const userRef = doc(db, "users", uidParam);
            const userSnap = await getDoc(userRef);
            if(userSnap.exists()){
                const user = userSnap.data();
                nombreEl.textContent = user.nombre;
                avatarEl.src = user.avatar || "https://via.placeholder.com/100";
                bioEl.textContent = user.biografia || "Sin biografía.";
                
                // Mostrar botón editar solo si es MI perfil
                onAuthStateChanged(auth, (loggedUser) => {
                    if(loggedUser && loggedUser.uid === uidParam) {
                        document.getElementById("toggleEdit").style.display = "inline-block";
                    } else {
                        document.getElementById("toggleEdit").style.display = "none";
                    }
                });
            }
        }

        // 2. Cargar proyectos
        const q = query(collection(db, "proyectos"), where("userId", "==", uidParam));
        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            snapshot.forEach((docItem) => {
                const p = docItem.data();
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="${p.imagen || 'https://via.placeholder.com/400x300'}">
                    <div class="card-content">
                        <strong>${p.titulo}</strong>
                        <p style="font-size: 0.9rem; color: #555;">${p.descripcion.substring(0, 50)}...</p>
                    </div>
                `;
                card.onclick = () => window.location.href = `proyecto.html?id=${docItem.id}`;
                grid.appendChild(card);
            });
        });

        // 3. Manejo de edición
        document.getElementById("toggleEdit").onclick = () => {
            const section = document.getElementById("editSection");
            section.style.display = section.style.display === "block" ? "none" : "block";
        };

        window.guardarCambios = async function() {
            const nuevaURL = document.getElementById("nuevoAvatar").value;
            const bioText = document.getElementById("nuevaBio").value;
            const user = auth.currentUser;

            if(!user || user.uid !== uidParam) return;

            const userRef = doc(db, "users", user.uid);
            const updates = {};
            if(nuevaURL) updates.avatar = nuevaURL;
            if(bioText) updates.biografia = bioText;

            try {
                await updateDoc(userRef, updates);
                alert("Perfil actualizado");
                location.reload();
            } catch (e) {
                alert("Error al actualizar");
            }
        };

        cargarPerfil();
    </script>
</body>
</html>
